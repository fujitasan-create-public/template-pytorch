seed: 42
log_level: INFO

model:
  name_or_path: "Qwen/Qwen2.5-1.5B"
  trust_remote_code: true
  torch_dtype: "bfloat16" # "float16" or "float32" も指定可

lora:
  r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - up_proj
    - down_proj
    - gate_proj

data:
  train_file: "finetune_template/data/train.jsonl"
  text_field: "text"
  max_seq_length: 1024

training:
  output_dir: "outputs/lora-run"
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 0.0002
  weight_decay: 0.01
  warmup_ratio: 0.03
  logging_steps: 10
  save_steps: 200
  save_total_limit: 2
  lr_scheduler_type: "cosine"
  max_grad_norm: 1.0
  fp16: false
  bf16: true
  gradient_checkpointing: true
